<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кулинарная Монетка</title>
    <style>
        :root {
            --primary: #d35400;
            --primary-hover: #e67e22;
            --bg-color: #fdfbf7;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            max-width: 700px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-hover);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 36px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(211, 84, 0, 0.3);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-left: auto;
            margin-right: auto;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(211, 84, 0, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Recipe Content */
        #recipe-container {
            display: none;
            text-align: left;
            background-color: #fafafa;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #eee;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Offline Emoji Image Replacement */
        .recipe-visual {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            transition: background 0.5s ease;
        }

        .recipe-content {
            padding: 30px;
        }

        .cuisine-tag {
            display: inline-block;
            background-color: #2c3e50;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .recipe-title {
            font-size: 26px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        h3 {
            color: var(--primary);
            font-size: 18px;
            margin-top: 25px;
            margin-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 5px;
        }

        ul, ol {
            padding-left: 20px;
            color: #444;
            line-height: 1.6;
            margin-top: 0;
        }

        li {
            margin-bottom: 10px;
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .recipe-content {
                padding: 20px;
            }
            .recipe-visual {
                height: 200px;
                font-size: 80px;
            }
            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

        function getRandomRecipe() {
            const btn = document.getElementById('generate-btn');
            const btnText = document.getElementById('btn-text');
            
            // Легкая анимация кнопки для ощущения выбора
            btnText.innerText = 'Выбираем... 🪙';
            btn.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * recipes.length);
                const recipeData = recipes[randomIndex];

                // Заполняем текстовые данные
                document.getElementById('title').innerText = recipeData.title;
                document.getElementById('cuisine').innerText = recipeData.cuisine;
                
                const ingredientsList = document.getElementById('ingredients-list');
                ingredientsList.innerHTML = recipeData.ingredients.map(ing => `<li>${ing}</li>`).join('');
                
                const instructionsList = document.getElementById('instructions-list');
                instructionsList.innerHTML = recipeData.instructions.map(inst => `<li>${inst}</li>`).join('');

                // Заполняем визуальную часть (офлайн картинка)
                const visual = document.getElementById('recipe-visual');
                visual.innerText = recipeData.emoji;
                visual.style.background = recipeData.color;

                // Показываем контейнер
                document.getElementById('recipe-container').style.display = 'block';

                // Возвращаем кнопку в исходное состояние
                btnText.innerText = 'Бросить еще раз!';
                btn.style.transform = 'none';
            }, 300); // 300мс задержка для красоты
        }
    </script>
